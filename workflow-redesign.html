# Workflow redesign (draft) — the design tree as a research programme

> **Status:** draft rev 6, 2026-06-16. A scheduler walks a **tree-with-cross-cuts
> of design nodes (issues)**; whiteboard / plan / implement are **moves on a
> node**, not phases. Spine: **append-only, typed, numbered comments**, read only
> through the MCP ("latest wins"); **one issue per node**; nothing is edited. The
> machinery is **generic**; r-science is one plugin (§7). Supersedes
> `updated_design.md` (kept for history).

---

## 1. Substrate: one issue per node, append-only, three stores

A node is one **GitHub issue**; its living content is **append-only, typed,
numbered comments** — we *never edit*. The **MCP is the only reader**: it folds the
stream to a current view ("latest comment of this type/key wins") and serves that;
older versions are invisible unless explicitly requested. So: no edit/append
contradiction (overrule = a later comment); no pollution (nobody reads raw);
fewer issues (design/plan/construction are comment **types**, not separate issues
— revising #16's separate-issue form, since type-filtering now separates them).

**Anatomy of an issue** = title + body + comments + labels + state + sub-issue
links. Under append-only:

- **Body** = the write-once **stub** at fission (title, `Part-of:`, motivating
  example). *Plus*, for **sealed** nodes only, an **auto-mirrored `## Current
  status`** section: when a new design comment is published a script copies it into
  the body (token-free, machine-written, never hand-edited) so the web view is
  human-friendly. A materialised view, not a second source of truth.
- **Comments** = everything living, append-only.
- **Labels / state / sub-issue links** = best-effort derived indices; in-text
  markers are canonical.

**Three stores**, each with graceful degradation:

1. **Issues** — canonical *meaning* and the **source of truth**: design, plan,
   summaries, references, gauges, and **references to** everything in stores 2–3.
2. **Local transcript cache** — gitignored/buildignored, presentation-text only
   (§11.2). Best-effort; for the spirit-check.
3. **Local artefact cache** — gitignored/buildignored, content-addressed: bulky
   intermediates (raw benchmark data, long computations, scout caches). **Issues
   stay primary:** an agent writes a numbered reference into the issue saying
   *what it is, how it was generated, and where it's cached*, so others know it
   exists and can **recreate** it if the cache is gone:

   ```
   Artefact: #16.art1 — what: fitted SSD posterior (10k draws)
                        — how: Rscript scripts/fit_ssd.R --seed 42
                        — cache: tmp/art/<sha>.rds
   ```

   `tmp` is only a way to avoid redoing expensive work; losing it is non-fatal.

**Invariants & discipline.** *Store vs view* — consumption is an auto-generated
projection (current design/plan, ancestor path, the registries of §5, arch map
#20). *Append-only + numbered keys* — `#16.q4` question · `.v3` validation req ·
`.alt2` alternative · `.de1` dead-end · `.fd1` future direction · `.opt1`
optimisation · `.art1` artefact; "latest comment about a key wins."
*Construction-comment discipline* — the implementer **batches** writes; comments
are **curated** (what was done + summary result tables), **not raw dumps**, and
**never duplicate git** (the MCP reads diffs); bulky data → the artefact cache.
*Length plan* — GitHub paginates comments at ~100/page; at that boundary (and on
settle) the MCP emits a **consolidation/checkpoint comment** ("current state = …;
folds `#a`–`#b`") so it reads only from the latest checkpoint forward — which also
helps humans browsing.

## 2. The four axes — and who uses each for what

| Axis | Question | Range | Set / derived by | **Used by → for** |
|------|----------|-------|------------------|-------------------|
| **Altitude** | Where in the tree? | root → leaf | tree position | context-MCP → what to serve; scheduler → floor order |
| **Fidelity** | How *built-out*? | stub → interface → mock → correct (§3) | *construct*; parent **folds** children | scheduler → floor / done-ness; reporting |
| **Confidence** | How sure it's *right*? | low → high | *diverge*/*validate* + user; **rises as numbered `q`/`v` resolve** | scheduler → priority; re-entry → re-diverge? |
| **Centrality** | How much rests on it? | belt → core | **graph-derived**: tree depth + `Boundary`/`Blocked-by` in-degree **+ aspect participation** (§4) | scheduler → priority |

Priority ≈ **centrality × (1 − confidence)**. Centrality's value isn't hand-edited;
humans override at the **next-task** level (pins/skips, §1/§9).

## 3. Fidelity, correctness & optimisation

Build-out rungs, measured against the node's *currently declared* correctness
level: **stub** (boundary undecided) → **interface** (boundary set, internals
unknown — the acute→chronic node) → **mock** (approximate internals, end-to-end
runnable) → **correct** (internals **tested AND benchmarked**, face-valid, meeting
the declared level).

**Optimisation is part of *construct*, not a flag.** The construct move runs
implement → test → benchmark → **first-pass optimise**: the orchestrator reads the
benchmarks and knocks off anything *clearly* problematic (very expensive, or
hot-path — called repeatedly in normal use) while keeping tests green. What it does
**not** do is sink effort into optimisation before the whole tree is `correct` —
you can't yet see where the big wins are. So `correct` = tested + benchmarked +
obvious wins taken.

**Correctness ladder.** A node's design names its current approach *and* a ranked,
numbered list of known-better directions it is deliberately deferring; `correct`
means it meets the *current* level (a declared approximation is fine):

```
Correctness now: Gaussian SSD (adequate for current data)
#3.fd1  Future: non-parametric SSD — more correct for multimodal sensitivity
#3.fd2  Future: censored likelihood — only if we ingest <LOD values
```

**Two later, selective passes** (after the *whole tree* is `correct`; both
registry-driven by #24 collation — the speed/accuracy mirror image):

- **Speed** — the existing benchmark → low-hanging-fruit → optimise skill, driven
  by the **optimisation registry** (`opt` markers + dormant opt nodes, §5);
  behaviour-preserving.
- **Accuracy** — if results disappoint, consult the **future-directions registry**
  (`fd` markers + dormant fd nodes, §5) and activate the ones worth raising.

**Fidelity fold** = **min over load-bearing children** + own glue (default; the
fold rule is a schema field, swappable later without migration).

## 4. Aspects — the cross-cut that keeps it a graph

Not everything is tree-shaped. An **aspect** is a cross-cutting concern spanning
nodes irrespective of tree position — *uncertainty propagation, units/dimensions,
provenance/citation, reproducibility/seeding, error taxonomy, performance*.
Membership = `aspect:<name>` marker (mirrored by label). This is #16's founding
premise ("design is not isomorphic to code"); the structure is a **tree of
ownership + cross-cut edges = a DAG**. Aspects are **mostly project-defined** —
they emerge during design — though a plugin **may seed a few defaults**
(uncertainty, units, reproducibility).

An aspect carries a **contract** every member must honour (the per-node
cross-cutting contract from #18, owned by the aspect): e.g. *uncertainty* → "every
member exposes uncertainty as a ±CI on its outputs." Its jobs:

- **Consistency (linter):** #24 checks every member honours the contract.
- **Context (MCP):** serves the contract + peer summaries on request — the
  cross-cut analogue of tree-siblings.
- **Centrality:** aspect hub-ness feeds the gauge.
- **Change type:** editing a contract is a **cross-cut change** sweeping all
  members (distinct from tree-local; broad → human sign-off; extractor lists who's
  affected).

## 5. Deferred work & dormant nodes

Three kinds of "not now" — rejected-but-detailed alternatives (`alt`), future
directions (`fd`), known optimisations (`opt`) — share one mechanism:

- **Small** → an inline **numbered marker** on the node (`#16.fd1 Future:
  non-parametric — …`).
- **Detailed** → it graduates to a **dormant node**: a real issue, append-only and
  linked (`Part-of:` / `Design:`), but **closed** with a `dormant` label. The
  scheduler scans only *open* nodes, so a closed dormant node is automatically out
  of the floor, the fold, and centrality — and the open-issues list stays a
  browsable working set. Its detail (the several paragraphs you already worked out)
  lives there, MCP-readable, instead of bloating the parent.

The promotion threshold is the same "what gets an issue" rule (§6): it earns an
issue when its content must persist meaningfully on its own.

**Activation = reopen.** A decision reopens the issue: the **accuracy pass**
activates an `fd`, the **speed pass** an `opt`. Reopened, the node joins the
frontier and goes through the normal moves — which is when its acceptance
criteria / validation reqs get written (so we don't author them until we commit).
The extractor builds the per-kind **registries** the passes consume by scanning
inline markers + `dormant`-labelled closed issues.

## 6. Facets, templates, what gets an issue

One issue per node; typed comments, each templated: **Design** (purpose ·
decomposition · `Boundary` · assumptions · numbered `q`/`v`/`alt`/`fd`/`opt` ·
current correctness level), **Plan** (testing & benchmark requirements, staged
tasks, success criteria), **Construction** (curated build log + PR links). The MCP
serves latest Design and latest Plan independently. **What gets an issue:**
anything that must persist across a context-window boundary; in-window subtasks
don't.

## 7. Generic core vs plugin specialisation

**Tests and benchmarks are generic core** — every node, every domain has both;
only the *manifestation* is per-plugin. *Tests* = checks the node does what it
should. *Benchmarks* = cost/quality dimensions we track and later optimise.

| Generic | r-science | report | dashboard |
|---------|-----------|--------|-----------|
| **tests** | testthat + face-validity | refs valid & actually support the claim; arguments logical (subagent) | renders on real data; interactions work (e2e) |
| **benchmarks** | runtime, memory (`bench`) | word count, readability | render time, bundle size, a11y |
| **`correct`** | tested + benchmarked + matches reference | claims sourced + within length/readability | renders + a11y + perf budget |
| **construct** | implement + test + benchmark + first-pass optimise | draft + cite + check + tighten | build + wire + check + trim |
| **cost ladder** | reason → research → prototype → build | reason → research → outline → draft | reason → research → wireframe → build |

Generic core = node model, four axes, aspects, deferred-work/dormant nodes,
scheduler, seal/change-auth, MCP/store-vs-view, append-only + numbering, tests &
benchmarks, the move state machine.

## 8. The moves (replacing the phases)

| Move | Old skill | What it does |
|------|-----------|--------------|
| **Diverge** | `whiteboard` | "Is this right?" + scout; explore options, weigh against the user's desiderata |
| **Converge** | `plan` | Decompose + schedule children; emit the plan comment |
| **Construct** | `tests`/`implement`/`benchmark` | implement + test + benchmark + first-pass optimise |
| **Validate** | `verify`/`review` | Tests green + face-valid, against the latest saved design |
| **Restructure** | (new) | Move a boundary / re-parent — owned by the parent |

How a move is *conducted* depends on the seal state (§11.3).

```mermaid
stateDiagram-v2
    [*] --> Stub: created by parent fission
    Stub --> Diverge
    Diverge --> Converge: direction settled
    Diverge --> Restructure: direction wrong, bump parent
    Converge --> Fission: too big, spawn children
    Converge --> Construct: small enough, build
    Fission --> Decomposed
    Decomposed --> Settled: all children settled
    Decomposed --> Diverge: child raised a design fault
    Construct --> Validate: tests green
    Construct --> Converge: plan fault
    Validate --> Settled: green and face-valid
    Validate --> Construct: tests or face-validity fail
    Validate --> Diverge: design fault, oh bugger
    Settled --> Diverge: reopen via change-authorization
    Settled --> [*]

    note right of Diverge
        Diverge = whiteboard
        Converge = plan, decompose and schedule
        Construct = implement, test, benchmark, first-pass optimise
        Moves, re-enterable - not one-pass phases
    end note
```

## 9. The scheduler & change routing

1. **Floor first — walking skeleton.** Iterative-deepening: whole tree to
   **interface** (every boundary wired, end-to-end runnable) before deepening.
2. **Best-first above the floor.** Maximise **centrality × (1 − confidence)** via
   the **cheapest cost-ladder rung**, honouring pins/skips. *Construct* takes its
   own obvious wins (§3).
3. **Then the two passes** (§3): speed and accuracy, registry-driven, activating
   dormant `opt`/`fd` nodes selectively — only once the tree is `correct`.
4. **Batch / drain** within a window.

```mermaid
flowchart LR
    A["Scan frontier (active open nodes)"] --> B{"Floor met? whole tree at interface?"}
    B -- no --> C["Pick shallowest unmet node (walking skeleton)"]
    B -- yes --> D["Pick max centrality×(1−confidence), minus skips, plus pins"]
    C --> E["Open SCOPED window (altitude × mode) + right model"]
    D --> E
    E --> F["Cheapest cost-ladder rung that moves the gauges"]
    F --> G["Append result: typed numbered comments; gauges update"]
    G --> A
```

**Change-routing ladder** (construct failure): retry plan → retry with a stronger
model → reconsider the plan (converge) → if no obvious fix *or* looped → diverge →
if nothing *or* looped → **escalate**. Faults propagate **up** until the node to
change is **sealed**, then escalate. A **token/attempt budget** trips escalation
early. ("Looped" = a per-node/per-fault attempt counter.)

## 10. Context windows (altitude × mode)

- **On (re-)entering a node, first reconcile its open items:** have any `q`/`v`
  resolved? Append answers, recompute **confidence**, decide if this is still the
  right place to be.
- **Forward work at N** loads root→N ancestor *current* views (ledger excluded).
- **Re-diverge at N** loads N's current view *with* its ledger + triggers the
  spirit-check (§11.2).
- The right **model** binds per window.

## 11. Memory, rationale, sealing

### 11.1 Ledger, questions, directions = numbered comments

Alternatives, questions, validation reqs, dead-ends, future directions and
optimisations are append-only comments keyed by id; the MCP folds "latest wins" —
a stable log, no edits. Resolved `q`/`v` feed **confidence**; `fd`/`opt` feed the
accuracy/speed passes; `de` is the dead-ends registry.

### 11.2 Transcripts (local) and the spirit-check

Transcripts: **local, gitignored/buildignored, presentation-text only** (no CoT,
no tool output). Job: at **change-time**, catch where *the saved artefact was
ambiguous but the conversation wasn't*. A cheap agent reads the current design +
transcript: "is this change true to the original reasoning?" **Validation** only
checks the latest saved design. **No transcript → ask the user.** Reliability is
empirical: start naggy, relax via the sealed-change digest feedback loop.

### 11.3 Sealing — default sealed; it governs how moves run

Design needs human sign-off, fractally. **Default = sealed, inherited; root starts
sealed.** `/unseal #N` delegates N and its subtree downward; `/seal #N` re-claims a
node inside an unsealed region. Agents prompt to unseal on descent and
**auto-suggest** from tree position (sibling seal depth).

Sealing controls **how every move is conducted**, not only post-settlement edits:

| On a node | Diverge | Converge (decomposition) | Plan detail / Construct | Change to settled design |
|-----------|---------|--------------------------|-------------------------|--------------------------|
| **Sealed** | collaborative: propose options + pros/cons | collaborative: *"I think x tasks; alternatively y — pros/cons. What do you think?"* | delegated; surface design-faults up | spirit-check → digest or escalate |
| **Unsealed** | autonomous | autonomous | autonomous | autonomous |

The decomposition **is design**, so sealed-converge proposes it for sign-off rather
than splitting automatically. **Decided: a single seal** (no separate design/plan
levels) — the facet split already separates them, and one seal making design
decisions collaborative covers it.

```mermaid
flowchart TB
    P["A node or descendant proposes changing node H"] --> U{"Is H unsealed?"}
    U -- "yes" --> AUTO["Change freely (autonomous)"]
    U -- "no — sealed" --> SP{"Spirit-check: read H + local transcript. Minor and true to the original reasoning?"}
    SP -- "yes" --> REP["Apply, then add to the user's next-contact digest"]
    SP -- "no / unclear / major" --> E["Escalate to the user now"]
```

**Precedents:** ADRs (append-only, supersedes); IBIS/QOC (+ caution that heavy
capture fails → one-line entries); git (history is the log; current = a fold).

## 12. Example flows

### 12.1 Greenfield — a mixture-toxicity R package (condensed)

1. **Diverge @ root** *(sealed → collaborative)* — scout returns **several
   precedents** (msPAF, hazard quotients, mixture indices); you and the agent weigh
   them against your **actual desiderata** (regulatory acceptance? uncertainty
   reporting? the data you have) and land on msPAF; the losers are logged.
2. **Converge @ root** *(sealed → collaborative)* — *"I think SSD fitting, mixture
   model, ingest, reporting, and an acute→chronic step; alternatively fold
   acute→chronic into the mixture model — pros/cons. Which?"* On sign-off, #2–#6 are
   created; #6 at **interface**.
3. **Floor — walking skeleton** — wire every boundary; `mixtox::score()` runs
   end-to-end returning a *typed, wrong* number.
4. **Best-first** — #3 wins (high centrality — also a hub of the `uncertainty`
   aspect — low confidence). **Diverge @ #3** → concentration addition; fission into
   #7 (CA → correct) and **dormant** #8 (IA, detailed but deferred → `#3.fd1`).
5. **Construct @ #7** — implement + test + benchmark + first-pass optimise; drain
   it. FFT convolution loses to the direct loop → `#7.de1`. A bigger speedup is
   sketched but deferred → `#7.opt1`.
6. **"Oh bugger"** — #7 finds the #2↔#3 boundary needs per-species sensitivity, not
   one HC5. #1 owns it and is **sealed** → spirit-check vs #1's transcript; real
   gap → **escalate to you**.
7. **Settle upward**; later the **speed pass** picks up `#7.opt1` if the benchmark
   registry says it matters, and the **accuracy pass** activates dormant #8 only if
   results disappoint.

### 12.2 Deferred → wrong → re-diverge (rationale recall)

1. **Diverge @ #foo** (local session **S1**) — choose **A**; log `#foo.alt1
   B — rejected — censoring (X)`. Defer.
2. **+2 weeks, Construct @ #foo** — A is wrong (hierarchical data). Reopening a
   settled node → change-auth (§11.3): sealed? spirit-check vs S1.
3. **Re-diverge @ #foo** loads the current view *with* the ledger; tempted by B.
   The ledger shows `B — rejected — censoring (X)` → our data is uncensored → append
   `#foo.alt1 Update: B viable — X moot`; adopt B. (Had the ledger missed it, the
   spirit-check would.)
4. **Validate** against the saved issue only. Settle B.

## 13. What survives, what changes

| Existing | Status | Change |
|----------|--------|--------|
| #16 / #17 tree + altitude context | **keep** | blackboard + scoped windows |
| #16 separate design/construction issues | **revise** | one issue per node; facets as comment types |
| #16 cross-cutting structure (aspects) | **keep, promote** | aspects get jobs (§4); project-defined, plugin may seed |
| #16 `not_planned` maturity | **keep, reuse** | **dormant** = closed + `dormant` label; reopen to activate (§5) |
| #24 markers/extractor/linter/MCP | **keep, central** | gauges, numbered keys, fold serving, **3 stores**, registries, checkpoints |
| #18 markers | **keep, extend** | gauges, `Sealed`, `Artefact`, numbered keys (`q`/`v`/`alt`/`de`/`fd`/`opt`/`art`) |
| #21 evidence / #22 dead-ends | **keep, generalise** | instances of the registry pattern |
| tests & benchmarks | **keep, make generic core** | manifestation per plugin (§7) |
| `optimised` flag | **drop** | optimise is built into *construct* (obvious wins) + a later registry-driven pass |
| editing anything | **drop** | append-only; sealed-node body auto-mirror only |
| 3-conversation sequence diagram | **drop** | tree + scheduler |

## 14. Recommendations / open items

**Decided this rev:** fold = min-over-load-bearing (schema-versioned); confidence
= coarse ordinal from resolved `q`/`v`; numbered-key scheme incl. `opt`/`art`;
transcripts presentation-text, degrade to ask-user; spirit-check starts naggy;
sealed-node body auto-mirror; **build** seal auto-suggestion; checkpoint trigger =
~page boundary (≈100 comments) + on settle; artefact refs carry how-to-recreate
(cache is disposable); aspects mostly project-defined (plugin may seed); no `fd`
acceptance criteria until activation; deferred work uses inline markers →
**dormant nodes** when detailed.

**Also decided (the last open items):** **single seal** — no design/plan split;
**dormant = closed + `dormant` label**, reopened on activation (so the open-issues
list stays a browsable working set); **artefact GC is aggressive** — a
size-bounded LRU `tmp/` cache, drop anything anytime and recreate from the `how:`
recipe, with benchmark *summaries* kept in-issue so nothing load-bearing depends on
the cache.

**No conceptual items remain open** — what's left is specification, per §15.

**Future, not now:** multi-user teams; full portability off GitHub/Claude-Code
(graceful degradation + plain-text canonical).

## 15. Relationship to the #16 epic

A **promotion**: #16 built a *context layer*; this adds the **control layer**
(scheduler + gauges + moves), the **memory/authorization layer** (§11), the
**append-only + MCP-fold** substrate, the **three-store** model, **dormant nodes**,
and **promotes aspects** to working cross-cuts. It **revises** #16's separate-issue
form into one-issue-per-node. Sequencing: **#24 first** (now incl. numbered keys,
fold serving, registries, artefact cache, checkpoints), then marker/gauge +
aspect-contract extensions, then teach the skills to behave as moves.
