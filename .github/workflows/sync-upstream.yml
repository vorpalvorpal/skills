name: Sync upstream (posit-dev/skills)

# Monthly check for changes in the upstream Posit skills repo.
# - If upstream has new commits and they merge cleanly, auto-merge to main.
# - If the merge conflicts, open an issue so a human can resolve it.
# Conflicts, when they happen, are almost always in .claude-plugin/marketplace.json
# and README.md (the only upstream files this fork edits).
# Requires that branch protection on main (if any) allows the GITHUB_TOKEN to push.

on:
  schedule:
    - cron: "0 6 1 * *"   # 06:00 UTC on the 1st of each month
  workflow_dispatch: {}    # allow manual runs from the Actions tab

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/posit-dev/skills.git
          git fetch upstream main

      - name: Count new upstream commits
        id: check
        run: |
          behind=$(git rev-list --count origin/main..upstream/main)
          echo "behind=$behind" >> "$GITHUB_OUTPUT"
          echo "Upstream is $behind commit(s) ahead of main."

      - name: Auto-merge if clean, otherwise open an issue
        if: steps.check.outputs.behind != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git checkout main
          if git merge --no-edit upstream/main; then
            # Keep the r-science bundle complete: append any newly added skills.
            python3 .github/scripts/update-bundle.py
            if ! git diff --quiet; then
              git add .claude-plugin/marketplace.json
              git commit -m "chore: add new upstream skills to the r-science bundle"
            fi
            git push origin main
            echo "Auto-merged ${{ steps.check.outputs.behind }} upstream commit(s) into main."
          else
            git merge --abort
            # Avoid piling up duplicate issues if a conflict goes unresolved.
            if gh issue list --state open --search "Upstream sync needs manual merge in:title" | grep -q .; then
              echo "An open sync-conflict issue already exists; not opening another."
            else
              gh issue create \
                --title "Upstream sync needs manual merge" \
                --body "The monthly sync from posit-dev/skills hit merge conflicts (${{ steps.check.outputs.behind }} commit(s) behind). Clean merges auto-merge to main; this one needs a human.

          Resolve locally:

          \`\`\`
          git fetch upstream
          git merge upstream/main
          \`\`\`

          Likely conflict files: .claude-plugin/marketplace.json and README.md. Everything under r-science/ is fork-only and should not conflict. Close this issue once main is synced."
            fi
          fi
